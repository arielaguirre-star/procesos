<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor TecnoBot - Estación de Producción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de Firebase (Se inyecta automáticamente en el entorno)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tecnobot-percha-1';

        // Variables globales para la app
        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.doc = doc;
        window.setDoc = setDoc;

        // Autenticación inicial obligatoria para usar Firestore
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Error de auth:", error);
            }
        };
        initAuth();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050508;
            --card-bg: rgba(15, 15, 25, 0.9);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--dark-bg);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .phase-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .phase-card:not(.locked):hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .locked {
            filter: grayscale(1) opacity(0.3);
            cursor: not-allowed;
            pointer-events: none;
        }

        .tech-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            object-fit: cover;
        }

        .input-dark {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }

        .input-dark:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }

        @keyframes pulse-neon {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-active { animation: pulse-neon 2s infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80" alt="Nano Banana Tech Background" class="tech-bg">

    <!-- Pantalla de Inicio / Registro -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center p-6 bg-black/95 backdrop-blur-md">
        <div class="glass-panel w-full max-w-lg p-8 md:p-12 rounded-3xl text-center border-cyan-500/30">
            <div class="w-16 h-16 bg-cyan-500/20 rounded-2xl flex items-center justify-center text-cyan-400 mx-auto mb-6 text-2xl shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                <i class="fas fa-microchip"></i>
            </div>
            <h2 class="text-3xl font-black mb-1 uppercase tracking-tighter italic">InventoBot 2.0</h2>
            <p class="text-slate-400 mb-8 text-xs tracking-widest uppercase">Estación de Trabajo en la Nube</p>
            
            <div class="space-y-4">
                <!-- Arreglo de Apellido fuera de cuadro -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="student-name" class="input-dark w-full p-4 rounded-xl text-sm" placeholder="Nombre">
                    <input type="text" id="student-surname" class="input-dark w-full p-4 rounded-xl text-sm" placeholder="Apellido">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <select id="student-course" class="input-dark w-full p-4 rounded-xl appearance-none text-sm">
                        <option value="" disabled selected>Año/Div</option>
                        <option value="1º 1">1º 1</option>
                        <option value="1º 2">1º 2</option>
                        <option value="1º 3">1º 3</option>
                        <option value="1º 4">1º 4</option>
                        <option value="1º 5">1º 5</option>
                        <option value="1º 6">1º 6</option>
                    </select>
                    <select id="student-shift" class="input-dark w-full p-4 rounded-xl appearance-none text-sm">
                        <option value="" disabled selected>Turno</option>
                        <option value="TM">Mañana</option>
                        <option value="TT">Tarde</option>
                    </select>
                </div>

                <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-cyan-500/20 text-sm">
                    Acceso Biométrico
                </button>

                <div class="pt-6 border-t border-white/5">
                    <button onclick="toggleAdmin()" class="text-slate-500 hover:text-cyan-400 text-[10px] uppercase font-bold tracking-widest transition-colors">
                        <i class="fas fa-lock mr-2"></i> Acceso Docente
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Interfaz Principal (Oculta al inicio) -->
    <div id="main-ui" class="hidden">
        <nav class="sticky top-0 z-50 glass-panel px-6 py-4 border-b border-white/10">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-cyan-600 p-2 rounded-lg text-white">
                        <i class="fas fa-satellite-dish"></i>
                    </div>
                    <div>
                        <h1 class="text-xs font-bold tracking-widest uppercase">Misión: <span class="text-cyan-400 italic">La Percha Maker</span></h1>
                        <p id="display-user" class="text-[9px] text-slate-400 italic font-mono uppercase">ID_CLOUD: OFFLINE</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="bg-cyan-400/10 text-cyan-400 px-4 py-2 rounded-xl border border-cyan-400/30 font-mono text-sm">
                        <span id="xp-counter">0000</span> XP
                    </div>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-12">
            <header class="text-center mb-16">
                <h2 class="text-4xl font-black mb-4 uppercase tracking-tighter">Fases de <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Producción</span></h2>
                <div id="progress-container" class="max-w-xs mx-auto mb-4">
                    <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-1">
                        <span>Sincronización</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="xp-bar" class="bg-cyan-400 h-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
            </header>

            <div id="phases-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-20"></div>

            <div id="mission-area" class="hidden glass-panel rounded-3xl p-8 md:p-12 border border-cyan-400/30 mb-20">
                <div class="flex flex-col lg:flex-row gap-12">
                    <div class="flex-1">
                        <span id="mission-step" class="text-cyan-400 font-mono text-[10px] font-bold px-3 py-1 bg-cyan-400/10 rounded-full border border-cyan-400/20 mb-4 inline-block">FASE_XX</span>
                        <h4 id="mission-title" class="text-3xl font-bold mb-6 text-white uppercase italic">Título</h4>
                        <div id="mission-content" class="text-slate-300 space-y-4 mb-8 text-base"></div>
                        
                        <div class="bg-black/60 rounded-2xl p-6 border border-white/5 mb-8">
                            <div class="flex justify-between items-center mb-4">
                                <h5 class="text-cyan-400 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-robot mr-2"></i> Instrucción para IA</h5>
                                <button onclick="copyPrompt()" class="text-[9px] bg-white/5 hover:bg-cyan-400 hover:text-black px-3 py-1 rounded-lg transition-all uppercase font-bold">Copiar</button>
                            </div>
                            <p id="mission-prompt" class="font-mono text-xs italic text-slate-400"></p>
                        </div>

                        <div class="space-y-4">
                            <textarea id="user-input" class="w-full input-dark rounded-2xl p-6 h-48 text-sm" placeholder="Documenta tu avance aquí para guardarlo en la nube..."></textarea>
                            <button onclick="submitPhase()" id="submit-btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-black font-black py-4 rounded-xl transition-all text-sm uppercase">
                                Guardar en la Nube
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Panel de Administración -->
    <div id="admin-modal" class="fixed inset-0 z-[300] hidden bg-black/98 flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass-panel w-full max-w-5xl rounded-3xl p-8 max-h-[90vh] overflow-hidden flex flex-col border-cyan-500/20">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold text-white uppercase tracking-widest flex items-center gap-3">
                    <i class="fas fa-id-badge text-cyan-400"></i> Central de Monitoreo
                </h3>
                <button onclick="toggleAdmin()" class="text-slate-500 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div id="admin-auth" class="text-center py-20">
                <p class="mb-4 text-slate-400 uppercase tracking-widest text-[10px]">Ingresar Credencial Maestro</p>
                <input type="password" id="admin-pass" class="input-dark text-center text-3xl p-4 w-48 font-bold rounded-xl" maxlength="4" placeholder="••••">
                <button onclick="checkAdmin()" class="block mx-auto mt-6 px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-lg transition-all uppercase text-xs">Desbloquear</button>
            </div>

            <div id="admin-dashboard" class="hidden overflow-y-auto custom-scrollbar flex-1 pr-2">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                        <span class="text-[9px] text-slate-500 uppercase font-bold">Respuestas</span>
                        <p id="total-done" class="text-2xl font-black text-cyan-400">0</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                        <span class="text-[9px] text-slate-500 uppercase font-bold">Cursos</span>
                        <p id="total-courses" class="text-2xl font-black text-purple-400">0</p>
                    </div>
                </div>
                
                <div id="admin-log" class="space-y-8 pb-6"></div>
            </div>
        </div>
    </div>

    <script>
        const DOCENTE_KEY = "1304";
        let user = null;
        let globalData = [];

        const phaseData = [
            { step: "FASE_01", title: "Necesidad", content: "Analiza por qué faltan perchas y qué materiales reciclables podrías usar.", prompt: "IA, como experto tecnológico, ¿qué ventajas tiene el cartón corrugado sobre el plástico para una percha casera?", reward: 100, icon: "fa-search", color: "rose" },
            { step: "FASE_02", title: "Diseño", content: "Dibuja tu diseño. ¿Cómo evitarás que la ropa se resbale?", prompt: "IA, sugiere 3 métodos para que una percha de cartón sea antideslizante usando materiales comunes.", reward: 150, icon: "fa-pencil-ruler", color: "cyan" },
            { step: "FASE_03", title: "Gestión", content: "Haz el listado de materiales y los pasos del proceso.", prompt: "IA, arma un diagrama de bloques para fabricar una percha: desde la materia prima hasta el acabado final.", reward: 200, icon: "fa-list-ol", color: "amber" },
            { step: "FASE_04", title: "Ejecución", content: "Construye tu percha. ¿Qué herramientas usaste?", prompt: "IA, si no tengo pegamento, ¿qué tipo de encastres puedo hacer en cartón para que la percha no se desarme?", reward: 250, icon: "fa-hammer", color: "emerald" },
            { step: "FASE_05", title: "Evaluación", content: "Prueba el peso. ¿Qué salió bien y qué falló?", prompt: "IA, mi percha se dobla con un abrigo pesado. ¿Cómo puedo reforzar la estructura sin añadir mucho peso?", reward: 150, icon: "fa-vial", color: "purple" },
            { step: "FASE_06", title: "Venta", content: "Crea un nombre y eslogan para tu invento.", prompt: "IA, crea un nombre pegadizo y un eslogan para mi marca de perchas ecológicas hechas por alumnos.", reward: 150, icon: "fa-bullhorn", color: "blue" }
        ];

        async function login() {
            const name = document.getElementById('student-name').value.trim();
            const surname = document.getElementById('student-surname').value.trim();
            const course = document.getElementById('student-course').value;
            const shift = document.getElementById('student-shift').value;
            
            if (!name || !surname || !course || !shift) {
                alert("Completa todos los datos Operario.");
                return;
            }

            user = { 
                id: `${name}_${surname}_${course}_${shift}`.toLowerCase().replace(/\s/g, '_'),
                name, surname, course: `${course} ${shift}`, xp: 0, unlocked: 1 
            };

            // Mostrar UI principal
            document.getElementById('display-user').innerText = `ID_CLOUD: ${user.name} ${user.surname} | ${user.course}`;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            
            renderCards();
            loadUserData(); // Intentar cargar progreso previo si existe en Firebase
        }

        async function loadUserData() {
            // Sincronizar con Firebase
            if (!window.db) return;
            const q = window.query(window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas'));
            
            window.onSnapshot(q, (snapshot) => {
                const entries = snapshot.docs.map(doc => doc.data());
                globalData = entries;
                
                // Buscar progreso del usuario actual
                const userEntries = entries.filter(e => e.studentId === user.id);
                if (userEntries.length > 0) {
                    user.unlocked = Math.max(...userEntries.map(e => e.phase)) + 1;
                    user.xp = userEntries.reduce((acc, curr) => acc + curr.reward, 0);
                    updateStats();
                    renderCards();
                }
            });
        }

        function renderCards() {
            const grid = document.getElementById('phases-grid');
            grid.innerHTML = "";
            phaseData.forEach((data, index) => {
                const phaseNum = index + 1;
                const isLocked = phaseNum > user.unlocked;
                const isDone = phaseNum < user.unlocked;
                const card = document.createElement('div');
                card.className = `phase-card glass-panel p-6 rounded-2xl border border-white/5 cursor-pointer flex flex-col justify-between ${isLocked ? 'locked' : ''}`;
                card.onclick = () => openPhase(index);
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 bg-${data.color}-500/10 rounded-xl flex items-center justify-center text-${data.color}-400 border border-${data.color}-500/20"><i class="fas ${data.icon}"></i></div>
                            <span class="text-[9px] font-mono text-slate-600">${data.step}</span>
                        </div>
                        <h3 class="text-sm font-bold text-white uppercase">${data.title}</h3>
                    </div>
                    <div class="mt-6 pt-4 border-t border-white/5 flex items-center justify-between">
                        <span class="text-[9px] font-bold ${isDone ? 'text-emerald-400' : 'text-cyan-400'} uppercase">
                            ${isDone ? 'Completado' : (isLocked ? 'Cerrado' : 'Disponible')}
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openPhase(index) {
            const data = phaseData[index];
            document.getElementById('mission-area').classList.remove('hidden');
            document.getElementById('mission-step').innerText = data.step;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('mission-content').innerText = data.content;
            document.getElementById('mission-prompt').innerText = `"${data.prompt}"`;
            document.getElementById('user-input').value = "";
            window.scrollTo({ top: document.getElementById('mission-area').offsetTop - 50, behavior: 'smooth' });
        }

        async function submitPhase() {
            const input = document.getElementById('user-input').value.trim();
            if (input.length < 15) { alert("Respuesta muy corta."); return; }
            
            const currentIdx = user.unlocked - 1;
            const data = phaseData[currentIdx];
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            try {
                // GUARDAR EN FIRESTORE (REGLA 1: /artifacts/{appId}/public/data/{collection})
                const docId = `${user.id}_fase_${user.unlocked}`;
                await window.setDoc(window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas', docId), {
                    studentId: user.id,
                    student: `${user.name} ${user.surname}`,
                    course: user.course,
                    phase: user.unlocked,
                    phaseTitle: data.title,
                    text: input,
                    reward: data.reward,
                    timestamp: Date.now()
                });

                user.unlocked++;
                user.xp += data.reward;
                updateStats();
                renderCards();
                document.getElementById('mission-area').classList.add('hidden');
                alert("¡Fase guardada en la nube con éxito!");
            } catch (e) {
                console.error(e);
                alert("Error al guardar. Reintenta.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en la Nube";
            }
        }

        function updateStats() {
            document.getElementById('xp-counter').innerText = String(user.xp).padStart(4, '0');
            const percent = Math.round(((user.unlocked - 1) / 6) * 100);
            document.getElementById('xp-bar').style.width = `${percent}%`;
            document.getElementById('progress-percent').innerText = `${percent}%`;
        }

        function copyPrompt() {
            const text = document.getElementById('mission-prompt').innerText.replace(/"/g, '');
            navigator.clipboard.writeText(text);
            alert("Copiado.");
        }

        function toggleAdmin() {
            document.getElementById('admin-modal').classList.toggle('hidden');
            document.getElementById('admin-pass').value = "";
        }

        function checkAdmin() {
            if (document.getElementById('admin-pass').value === DOCENTE_KEY) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                startAdminMonitoring();
            } else { alert("Clave Incorrecta."); }
        }

        function startAdminMonitoring() {
            // Sincronización en tiempo real para el docente (REGLA 2: Consultas simples)
            const q = window.query(window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas'));
            window.onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                renderAdminLog(data);
            }, (error) => console.error("Error Firestore:", error));
        }

        function renderAdminLog(data) {
            const log = document.getElementById('admin-log');
            document.getElementById('total-done').innerText = data.length;
            
            const courses = [...new Set(data.map(d => d.course))];
            document.getElementById('total-courses').innerText = courses.length;

            log.innerHTML = "";
            const sortedCourses = courses.sort();

            sortedCourses.forEach(c => {
                const section = document.createElement('div');
                section.innerHTML = `<div class="sticky top-0 bg-black/80 backdrop-blur py-2 z-10 border-b border-cyan-500/30 mb-4"><h4 class="text-cyan-400 font-black text-xs uppercase italic">${c}</h4></div>`;
                
                const grid = document.createElement('div');
                grid.className = "space-y-3";

                data.filter(d => d.course === c).sort((a,b) => b.timestamp - a.timestamp).forEach(entry => {
                    const row = document.createElement('div');
                    row.className = "bg-white/5 p-4 rounded-xl border border-white/5";
                    row.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-white">${entry.student}</span>
                            <span class="text-[8px] bg-cyan-500/20 text-cyan-400 px-2 py-0.5 rounded uppercase font-bold">Fase ${entry.phase}</span>
                        </div>
                        <p class="text-[11px] text-slate-400 italic font-mono leading-tight">"${entry.text}"</p>
                    `;
                    grid.appendChild(row);
                });
                section.appendChild(grid);
                log.appendChild(section);
            });
        }
    </script>
</body>
</html>
