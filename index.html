<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor Tecnológico - Estación Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================================================================
        // 🛠️ CONFIGURACIÓN DE TU BASE DE DATOS (REEMPLAZA ESTO)
        // ================================================================
        // Ve a console.firebase.google.com -> Configuración del proyecto
        const firebaseConfig = {
            apiKey: "AIzaSyCYKZzFVglqVpje7E9Xz9LD-3LrZlZkUeM",
            authDomain: "procesos-27513.firebaseapp.com",
            projectId: "procesos-27513",
            storageBucket: "procesos-27513.firebasestorage.app",
            messagingSenderId: "842214104941",
            appId: "1:842214104941:web:a5c7592ef6df047d1e8464"
        };
        // ================================================================

        // Inicialización protegida
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Error inicializando Firebase:", e);
        }

        const appId = "proyecto-percha-v1"; // Identificador único de tu trabajo

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.doc = doc;
        window.setDoc = setDoc;

        // Autenticación Anónima (Asegúrate de activarla en la consola de Firebase > Auth)
        signInAnonymously(auth).catch(err => console.error("Error Auth:", err));
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --neon-blue: #00f2ff; --dark-bg: #050508; --card-bg: rgba(15, 15, 25, 0.9); }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--dark-bg); color: #e2e8f0; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .phase-card { transition: all 0.3s ease; }
        .locked { filter: grayscale(1) opacity(0.3); cursor: not-allowed; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; object-fit: cover; }
        .input-dark { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; }
        .input-dark:focus { border-color: var(--neon-blue); outline: none; }
    </style>
</head>
<body class="min-h-screen">

    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80" class="tech-bg">

    <!-- Pantalla de Login -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center p-6 bg-black/95 backdrop-blur-md">
        <div class="glass-panel w-full max-w-lg p-10 rounded-3xl text-center border-cyan-500/20">
            <div class="w-16 h-16 bg-cyan-500/10 rounded-2xl flex items-center justify-center text-cyan-400 mx-auto mb-6 text-2xl border border-cyan-500/20">
                <i class="fas fa-microchip"></i>
            </div>
            <h2 class="text-3xl font-black mb-1 uppercase italic tracking-tighter">InventoBot 2.0</h2>
            <p class="text-slate-500 mb-8 text-[9px] tracking-[0.4em] uppercase font-bold">Protocolo de Educación Tecnológica</p>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="student-name" class="input-dark p-4 text-sm" placeholder="Nombre">
                    <input type="text" id="student-surname" class="input-dark p-4 text-sm" placeholder="Apellido">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="student-course" class="input-dark p-4 text-sm appearance-none">
                        <option value="" disabled selected>Curso</option>
                        <option>1º 1</option><option>1º 2</option><option>1º 3</option>
                        <option>1º 4</option><option>1º 5</option><option>1º 6</option>
                    </select>
                    <select id="student-shift" class="input-dark p-4 text-sm appearance-none">
                        <option value="" disabled selected>Turno</option>
                        <option value="TM">Mañana</option><option value="TT">Tarde</option>
                    </select>
                </div>
                <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-all shadow-lg shadow-cyan-500/20">Ingresar al Sistema</button>
                
                <!-- Botón de acceso docente oculto (sin el número 1304) -->
                <button onclick="toggleAdmin()" class="text-slate-700 hover:text-slate-500 text-[9px] uppercase font-bold pt-4 transition-colors">
                    <i class="fas fa-shield-alt mr-1"></i> Acceso Restringido
                </button>
            </div>
        </div>
    </div>

    <!-- UI Principal -->
    <div id="main-ui" class="hidden">
        <nav class="sticky top-0 z-50 glass-panel px-6 py-4 border-b border-white/10">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-network-wired text-cyan-400"></i>
                    <h1 class="text-xs font-bold tracking-widest uppercase">Misión: <span class="text-cyan-400 italic">Percha Maker</span></h1>
                </div>
                <div id="xp-display" class="bg-cyan-400/10 text-cyan-400 px-4 py-1 rounded-full border border-cyan-400/30 font-mono text-xs">0000 XP</div>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-12">
            <div id="phases-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>
            
            <div id="mission-area" class="hidden glass-panel rounded-3xl p-8 border border-cyan-400/30 max-w-4xl mx-auto shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h4 id="mission-title" class="text-xl font-bold text-white uppercase italic"></h4>
                    <span id="badge-display" class="text-[9px] bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full border border-purple-500/30 font-bold uppercase tracking-widest">Insignia Pendiente</span>
                </div>
                <p id="mission-content" class="text-slate-400 text-sm mb-6 leading-relaxed"></p>
                <div class="bg-black/60 p-5 rounded-xl mb-6 text-[11px] font-mono text-slate-400 border border-white/5 relative group">
                    <div class="text-cyan-500 text-[9px] font-bold uppercase mb-2">Orden para tu IA:</div>
                    <span id="mission-prompt"></span>
                    <button onclick="copyPrompt()" class="absolute top-4 right-4 bg-white/5 hover:bg-cyan-500 hover:text-black px-3 py-1 rounded text-[9px] font-bold transition-all border border-white/10">COPIAR COMANDO</button>
                </div>
                <textarea id="user-input" class="w-full input-dark p-6 h-40 text-sm mb-4 focus:ring-1 ring-cyan-500" placeholder="Escribe aquí los resultados de tu investigación y proceso técnico..."></textarea>
                <button id="submit-btn" onclick="submitPhase()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest shadow-lg shadow-cyan-500/10">Sincronizar Avance</button>
            </div>
        </main>
    </div>

    <!-- Panel Docente -->
    <div id="admin-modal" class="fixed inset-0 z-[300] hidden bg-black/98 flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-5xl rounded-3xl p-8 max-h-[85vh] overflow-hidden flex flex-col border-cyan-500/20">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-white font-bold uppercase text-sm tracking-widest"><i class="fas fa-id-card-alt mr-2 text-cyan-400"></i> Terminal de Monitoreo</h3>
                <button onclick="toggleAdmin()" class="text-slate-500 hover:text-white transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="admin-auth" class="text-center py-10">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-4">Ingrese Código de Seguridad</p>
                <input type="password" id="admin-pass" class="input-dark text-center text-3xl p-4 w-44 rounded-xl mb-6 font-bold tracking-widest" maxlength="4" placeholder="••••">
                <button onclick="checkAdmin()" class="block mx-auto bg-cyan-500 text-black px-10 py-3 rounded-xl font-black text-xs uppercase transition-all hover:bg-cyan-400">Desbloquear Terminal</button>
            </div>
            <div id="admin-dashboard" class="hidden overflow-y-auto pr-2 space-y-6">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const DOCENTE_KEY = "1304";
        let user = null;
        const phaseData = [
            { title: "Análisis", content: "Analiza por qué faltan perchas en el club y qué materiales reciclables podrías usar.", prompt: "IA, como experto tecnológico, ¿qué ventajas tiene el cartón corrugado sobre el plástico para una percha casera?", reward: 100 },
            { title: "Diseño", content: "Dibuja tu diseño. ¿Cómo evitarás que la ropa se resbale?", prompt: "IA, sugiere 3 métodos para que una percha de cartón sea antideslizante usando materiales comunes.", reward: 150 },
            { title: "Gestión", content: "Haz el listado de materiales y los pasos del proceso.", prompt: "IA, arma un diagrama de bloques para fabricar una percha: desde la materia prima hasta el acabado final.", reward: 200 },
            { title: "Ejecución", content: "Construye tu percha. ¿Qué herramientas usaste y qué problemas tuviste?", prompt: "IA, si no tengo pegamento, ¿qué tipo de encastres puedo hacer en cartón para que la percha no se desarme?", reward: 250 },
            { title: "Evaluación", content: "Prueba el peso. ¿Qué salió bien y qué falló estructuralmente?", prompt: "IA, mi percha se dobla con un abrigo pesado. ¿Cómo puedo reforzar la estructura sin añadir mucho peso?", reward: 150 },
            { title: "Marca", content: "Crea un nombre y eslogan para tu invento sustentable.", prompt: "IA, crea un nombre pegadizo y un eslogan para mi marca de perchas ecológicas hechas por alumnos.", reward: 150 }
        ];

        function login() {
            const name = document.getElementById('student-name').value.trim();
            const surname = document.getElementById('student-surname').value.trim();
            const course = document.getElementById('student-course').value;
            const shift = document.getElementById('student-shift').value;
            if(!name || !surname || !course || !shift) return alert("Error: Datos incompletos.");
            
            user = { id: `${name}_${surname}_${course}_${shift}`.toLowerCase().replace(/\s/g,'_'), name, surname, course: `${course} ${shift}`, xp: 0, unlocked: 1 };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            renderCards();
            startSync();
        }

        function startSync() {
            if(!window.db) return; 
            const q = window.query(window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas'));
            window.onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                const myEntries = data.filter(e => e.studentId === user.id);
                if(myEntries.length > 0) {
                    user.unlocked = Math.max(...myEntries.map(e => e.phase)) + 1;
                    user.xp = myEntries.reduce((acc, curr) => acc + curr.reward, 0);
                    document.getElementById('xp-display').innerText = `${String(user.xp).padStart(4,'0')} XP`;
                    renderCards();
                }
            });
        }

        function renderCards() {
            const grid = document.getElementById('phases-grid');
            grid.innerHTML = "";
            phaseData.forEach((p, i) => {
                const locked = (i + 1) > user.unlocked;
                const done = (i + 1) < user.unlocked;
                grid.innerHTML += `
                    <div onclick="${!locked ? `openPhase(${i})` : ''}" class="glass-panel p-6 rounded-2xl border border-white/5 transition-all ${locked ? 'locked' : 'cursor-pointer hover:border-cyan-500/40 hover:translate-y-[-4px]'}">
                        <div class="flex justify-between mb-4">
                            <span class="text-[8px] font-mono text-slate-500">FASE_0${i+1}</span>
                            <i class="fas ${done ? 'fa-check-circle text-emerald-500' : (locked ? 'fa-lock text-slate-700' : 'fa-bolt text-cyan-400')}"></i>
                        </div>
                        <h5 class="text-xs font-bold text-white uppercase italic">${p.title}</h5>
                        <p class="text-[9px] mt-3 font-black tracking-widest ${done ? 'text-emerald-500/50' : (locked ? 'text-slate-800' : 'text-cyan-400 status-active')}">
                            ${done ? 'COMPLETADO' : (locked ? 'BLOQUEADO' : 'ACTIVADO')}
                        </p>
                    </div>
                `;
            });
        }

        function openPhase(i) {
            const p = phaseData[i];
            document.getElementById('mission-area').classList.remove('hidden');
            document.getElementById('mission-title').innerText = `Fase ${i+1}: ${p.title}`;
            document.getElementById('mission-content').innerText = p.content;
            document.getElementById('mission-prompt').innerText = p.prompt;
            document.getElementById('user-input').value = "";
            window.scrollTo({ top: document.getElementById('mission-area').offsetTop - 50, behavior: 'smooth' });
        }

        async function submitPhase() {
            if(!window.db) return alert("Error: Base de datos no inicializada. Revisa tu Configuración.");
            const input = document.getElementById('user-input').value.trim();
            if(input.length < 15) return alert("Documentación insuficiente. Explica mejor tu proceso.");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Sincronizando...";

            try {
                const docId = `${user.id}_fase_${user.unlocked}`;
                await window.setDoc(window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas', docId), {
                    studentId: user.id, 
                    student: `${user.name} ${user.surname}`, 
                    course: user.course,
                    phase: user.unlocked, 
                    text: input, 
                    reward: phaseData[user.unlocked-1].reward, 
                    timestamp: Date.now()
                });
                document.getElementById('mission-area').classList.add('hidden');
                alert("¡Fase sincronizada con la nube!");
            } catch (e) {
                alert("Error al guardar: Posiblemente faltan las Reglas de Escritura en Firebase o las credenciales son incorrectas.");
                console.error(e);
            } finally {
                btn.disabled = false; btn.innerText = "Sincronizar Avance";
            }
        }

        function copyPrompt() { 
            navigator.clipboard.writeText(document.getElementById('mission-prompt').innerText); 
            alert("Comando copiado para tu IA."); 
        }

        function toggleAdmin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === DOCENTE_KEY) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadAdminData();
            } else alert("Acceso denegado.");
        }

        function loadAdminData() {
            if(!window.db) return;
            const q = window.query(window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'entregas'));
            window.onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => doc.data());
                const dash = document.getElementById('admin-dashboard');
                dash.innerHTML = "";
                
                const courses = [...new Set(data.map(d => d.course))].sort();
                courses.forEach(c => {
                    let html = `<div class="sticky top-0 bg-black/90 py-2 border-b border-cyan-500/30 mb-4 z-10"><h6 class="text-cyan-400 text-[10px] font-black uppercase tracking-widest italic">${c}</h6></div>`;
                    data.filter(d => d.course === c).sort((a,b) => b.timestamp - a.timestamp).forEach(e => {
                        html += `<div class="bg-white/5 p-4 rounded-xl mb-3 border border-white/5 hover:border-white/10 transition-all">
                            <div class="flex justify-between mb-2">
                                <span class="text-white text-xs font-bold">${e.student}</span>
                                <span class="text-[8px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded font-bold">FASE ${e.phase}</span>
                            </div>
                            <p class="text-[10px] text-slate-400 italic leading-relaxed font-mono">"${e.text}"</p>
                        </div>`;
                    });
                    dash.innerHTML += html;
                });
            });
        }
    </script>
</body>
</html>
